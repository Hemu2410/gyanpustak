{% extends 'base.html' %}
{% block title %}Edit Book - GyanPustak{% endblock %}
{% block content %}
<div class="container">
    <div class="page-header">
        <h2>Edit Book</h2>
        <p><a href="{{ url_for('admin_books') }}">&larr; Back to Books</a></p>
    </div>

    <div class="card" style="max-width:700px;">
        <form method="post">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" name="title" required value="{{ book['title'] }}">
            </div>
            <div class="form-group">
                <label>Authors</label>
                <input type="text" name="authors" value="{{ book['authors'] or '' }}">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price *</label>
                    <input type="number" name="price" required step="0.01" value="{{ book['price'] }}">
                </div>
                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" name="isbn" value="{{ book['isbn'] or '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Publisher</label>
                    <input type="text" name="publisher" value="{{ book['publisher'] or '' }}">
                </div>
                <div class="form-group">
                    <label>Publication Date</label>
                    <input type="date" name="pub_date" value="{{ book['pub_date'] or '' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Edition</label>
                    <input type="number" name="edition" value="{{ book['edition'] }}" min="1">
                </div>
                <div class="form-group">
                    <label>Language</label>
                    <input type="text" name="language" value="{{ book['language'] or 'English' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Format</label>
                    <select name="format">
                        <option value="hardcover" {% if book['format'] == 'hardcover' %}selected{% endif %}>Hardcover</option>
                        <option value="softcover" {% if book['format'] == 'softcover' %}selected{% endif %}>Softcover</option>
                        <option value="electronic" {% if book['format'] == 'electronic' %}selected{% endif %}>Electronic</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select name="type">
                        <option value="new" {% if book['type'] == 'new' %}selected{% endif %}>New</option>
                        <option value="used" {% if book['type'] == 'used' %}selected{% endif %}>Used</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Purchase Option</label>
                    <select name="purchase_option">
                        <option value="buy" {% if book['purchase_option'] == 'buy' %}selected{% endif %}>Buy</option>
                        <option value="rent" {% if book['purchase_option'] == 'rent' %}selected{% endif %}>Rent</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" value="{{ book['quantity'] }}" min="0">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" name="category" value="{{ book['category'] or '' }}">
                </div>
                <div class="form-group">
                    <label>Subcategory</label>
                    <input type="text" name="subcategory" value="{{ book['subcategory'] or '' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Keywords</label>
                <input type="text" name="keywords" value="{{ book['keywords'] or '' }}">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Update Book</button>
        </form>
    </div>
</div>
{% endblock %}
