{% extends 'base.html' %}
{% block title %}Register - GyanPustak{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card" style="max-width:520px;">
        <h2>Create Account</h2>
        <p class="subtitle">Join GyanPustak to buy and rent textbooks</p>
        <form method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Create a password" minlength="6">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="Phone number">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="dob">
                </div>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" placeholder="Your address">
            </div>
            <div class="form-group">
                <label>University</label>
                <select name="university_id" required>
                    <option value="">-- Select University --</option>
                    {% for uni in universities %}
                    <option value="{{ uni['University_id'] }}">{{ uni['name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Major</label>
                    <input type="text" name="major" placeholder="Field of study">
                </div>
                <div class="form-group">
                    <label>Year of Study</label>
                    <select name="year_of_study">
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                        <option value="5">5th Year</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="undergraduate">Undergraduate</option>
                    <option value="graduate">Graduate</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">Create Account</button>
        </form>
        <p style="text-align:center;margin-top:20px;color:var(--text-light);">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
